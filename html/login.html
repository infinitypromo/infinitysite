<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="paginalogin">
    <button ><img src="logobranca.png" alt="Ícone" class="logobranca"></button>
    <div class="entrarfundo">
        <div class="tabs">
            <a href="login.html" class="tab active">Login</a>
            <a href="cadastro.html" class="tab">SignUp</a>
        </div>
        <form id="loginForm">
            <input type="email" id="email" class="inputfield" placeholder="Enter your email">
            <span id="emailError" style="color:red"></span>

            <input type="password" id="password" class="inputfield" placeholder="Enter Password">
            <span id="senhaError" style="color:red"></span>

            <button type="button" id="btnEntrar" class="btnentrar">Login</button>
        </form>
        <p class="esqueci"><a href="#" id="btnEsqueci">Esqueci minha senha</a></p>
    </div>
    <script type="module" src="../script/script.js"></script>
</body>
</html>
