<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="paginalogin">
    <div class="entrarfundo">
        <form id="loginForm">
            <h3 class="h3login1">Email</h3>
            <input type="email" id="email">
            <span id="emailError" style="color:red"></span>
            <h3 class="h3login2">Senha</h3>
            <input class="senha1" type="password" id="password">
            <span id="senhaError" style="color:red"></span>
            <br><br>
            <button type="button" id="btnEntrar">Entrar</button>
        </form>
    <script src="script.js"></script>
</body>
</html>
