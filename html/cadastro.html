<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
</head>
<body>
    <h2>Criar conta</h2>

    <form id="cadastroForm">
        <h3>Email</h3>
        <input type="email" id="email">
        <span id="emailError" style="color:red"></span>

        <h3>Senha</h3>
        <input type="password" id="password">
        <span id="senhaError" style="color:red"></span>

        <h3>Confirmar senha</h3>
        <input type="password" id="confirmarSenha">
        <span id="confirmarError" style="color:red"></span>

        <br><br>
        <button type="button" id="btnCadastrar">Cadastrar</button>
    </form>

    <p>Já tem conta? <a href="login.html">Entrar</a></p>

    <script type="module" src="../script/cadastro.js"></script>
</body>
</html>
