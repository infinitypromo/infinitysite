<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="paginalogin">
    <img src="logobranca.png" alt="Ícone" class="logobranca">
    <form id="cadastroForm">
        <div class="entrarfundo">
        <div class="tabs">
            <a href="login.html" class="tab">Login</a>
            <a href="cadastro.html" class="tab active">Cadastrar</a>
        </div>
        <input type="email" id="email" class="inputfield" placeholder="Enter your email">
        <span id="emailError" style="color:red" class="error"></span>

        <input type="password" id="password" class="inputfield" placeholder="password">
        <span id="senhaError" style="color:red" class="error"></span>

        <input type="password" id="confirmarSenha" class="inputfield" placeholder="confirm password">
        <span id="confirmarError" style="color:red" class="error"></span>

    <input type="text" id="username" class="inputfield" placeholder="username">
    <span id="usernameError" style="color:red" class="error"></span>

        <br><br>
        <button type="button" id="btnCadastrar" class="btnentrar">Cadastrar</button>
    </form>
    <script type="module" src="../script/cadastro.js"></script>
</body>
</html>
